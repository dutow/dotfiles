# Shared Hyprland configuration
# Host-specific overrides go in ~/.config/hypr/host.conf

source = ~/.config/hypr/host.conf

env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Adwaita
env = HYPRCURSOR_SIZE,24

# Ideas: https://github.com/Cybersnake223/Hypr/blob/main/.config/hypr/hyprland.conf
xwayland {
  force_zero_scaling = true
  use_nearest_neighbor = true
  enabled = true
}

# Appearance
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 8
}

animations {
    enabled = false
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
}

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrule {
    name = smart-gaps-tiled
    match:float = false
    match:workspace = w[tv1]
    border_size = 0
    rounding = 0
}
windowrule {
    name = smart-gaps-fullscreen
    match:float = false
    match:workspace = f[1]
    border_size = 0
    rounding = 0
}

# Keybindings
$mainMod = SUPER
$leftMainMod = SUPER_L # Sets "Windows" key as main modifier
$rightMainMod = SUPER_R # Sets "Windows" key as main modifier

bind = $mainMod, Return, exec, ghostty
bind = $mainMod, D, exec, wofi --show drun
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, E, exit,
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen,
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod SHIFT, J, movefocus, d

# Switch workspaces with left/right mainMod + [0-9]
binds = $leftMainMod, 1, workspace, 1
binds = $leftMainMod, 2, workspace, 2
binds = $leftMainMod, 3, workspace, 3
binds = $leftMainMod, 4, workspace, 4
binds = $leftMainMod, 5, workspace, 5
binds = $leftMainMod, 6, workspace, 6
binds = $leftMainMod, 7, workspace, 7
binds = $leftMainMod, 8, workspace, 8
binds = $leftMainMod, 9, workspace, 9
binds = $leftMainMod, 0, workspace, 0

binds = $rightMainMod, 1, workspace, 11
binds = $rightMainMod, 2, workspace, 12
binds = $rightMainMod, 3, workspace, 13
binds = $rightMainMod, 4, workspace, 14
binds = $rightMainMod, 5, workspace, 15
binds = $rightMainMod, 6, workspace, 16
binds = $rightMainMod, 7, workspace, 17
binds = $rightMainMod, 8, workspace, 18
binds = $rightMainMod, 9, workspace, 19
binds = $rightMainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Mouse bindings
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Screenshot
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

# Autostart
exec-once = waybar
exec-once = mako
#exec-once = hypridle
exec-once = /usr/libexec/polkit-gnome-authentication-agent-1
exec-once = SSH_ASKPASS=/usr/libexec/lxqt-openssh-askpass SSH_ASKPASS_REQUIRE=force ssh-add
