---
- name: Load distro-specific package names
  ansible.builtin.include_vars: "{{ dotfiles_distro }}.yml"

- name: Include tumbleweed-specific tasks
  ansible.builtin.include_tasks: tumbleweed.yml
  when: dotfiles_distro == 'tumbleweed'

- name: Install desktop application packages
  ansible.builtin.package:
    name: "{{ desktop_apps_packages }}"
    state: present
  become: true

- name: Install podman-cleanup timer service
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME }}/.config/systemd/user/podman-cleanup.service"
    mode: "0644"
    content: |
      [Unit]
      Description=Podman system prune

      [Service]
      Type=oneshot
      ExecStart=/usr/bin/podman system prune --all --force

- name: Install podman-cleanup timer
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME }}/.config/systemd/user/podman-cleanup.timer"
    mode: "0644"
    content: |
      [Unit]
      Description=Weekly podman cleanup

      [Timer]
      OnCalendar=Sun *-*-* 03:00:00
      Persistent=true

      [Install]
      WantedBy=timers.target

- name: Enable podman-cleanup timer
  ansible.builtin.systemd:
    name: podman-cleanup.timer
    scope: user
    daemon_reload: true
    enabled: true
    state: started
