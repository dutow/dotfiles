---
- name: Load distro-specific package names
  ansible.builtin.include_vars: "{{ dotfiles_distro }}.yml"

- name: Install zsh
  ansible.builtin.package:
    name: "{{ shell_packages }}"
    state: present
  become: true

- name: Set zsh as default shell
  ansible.builtin.user:
    name: "{{ dotfiles_user }}"
    shell: /usr/bin/zsh
  become: true

- name: Create systemd user directory
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.config/systemd/user"
    state: directory
    mode: "0755"
  when: ansible_facts.service_mgr == 'systemd'

- name: Install ssh-agent systemd user service
  ansible.builtin.copy:
    src: "{{ dotfiles_dir }}/systemd/ssh-agent.service"
    dest: "{{ ansible_facts.env.HOME }}/.config/systemd/user/ssh-agent.service"
    mode: "0644"
  when: ansible_facts.service_mgr == 'systemd'

- name: Enable ssh-agent systemd user service
  ansible.builtin.systemd:
    name: ssh-agent
    scope: user
    daemon_reload: true
    enabled: true
    state: started
  when: ansible_facts.service_mgr == 'systemd'

- name: Check if starship is installed
  ansible.builtin.command: which starship
  register: starship_check
  changed_when: false
  failed_when: false

- name: Install starship
  ansible.builtin.shell: curl -sS https://starship.rs/install.sh | sh -s -- -y
  when: starship_check.rc != 0
  become: true
