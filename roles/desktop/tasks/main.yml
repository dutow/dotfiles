---
- name: Load distro-specific package names
  ansible.builtin.include_vars: "{{ dotfiles_distro }}.yml"

- name: Include tumbleweed-specific tasks
  ansible.builtin.include_tasks: tumbleweed.yml
  when: dotfiles_distro == 'tumbleweed'

- name: Install desktop packages
  ansible.builtin.package:
    name: "{{ desktop_packages }}"
    state: present
  become: true

- name: Ensure user is in kvm group (Android emulator + other KVM workloads)
  ansible.builtin.user:
    name: "{{ dotfiles_user }}"
    groups: kvm
    append: true
  become: true

- name: Switch multimedia packages to Packman vendor
  ansible.builtin.command:
    cmd: zypper --non-interactive dist-upgrade --from packman --allow-vendor-change
  become: true
  register: packman_switch
  changed_when: "'Nothing to do' not in packman_switch.stdout"
  failed_when: false
  when: dotfiles_distro == 'tumbleweed'

- name: Install new recommended packages
  ansible.builtin.command:
    cmd: zypper --non-interactive install-new-recommends
  become: true
  register: new_recommends
  changed_when: "'Nothing to do' not in new_recommends.stdout"
  when: dotfiles_distro == 'tumbleweed'

- name: Check if ghostty is installed
  ansible.builtin.command: which ghostty
  register: ghostty_check
  changed_when: false
  failed_when: false

- name: Install ghostty from GitHub release (Ubuntu)
  when:
    - ghostty_check.rc != 0
    - dotfiles_distro == 'ubuntu'
  block:
    - name: Get latest ghostty-ubuntu release
      ansible.builtin.uri:
        url: https://api.github.com/repos/mkasberg/ghostty-ubuntu/releases/latest
        return_content: true
      register: ghostty_release

    - name: Download ghostty .deb
      ansible.builtin.get_url:
        url: "{{ ghostty_release.json.assets | selectattr('name', 'match', 'ghostty_.*_amd64_' ~ ansible_facts.distribution_version ~ '\\.deb') | map(attribute='browser_download_url') | first }}"
        dest: /tmp/ghostty.deb
        mode: '0644'

    - name: Install ghostty .deb
      ansible.builtin.apt:
        deb: /tmp/ghostty.deb
      become: true
