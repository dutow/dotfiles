---
- name: Load distro-specific package names
  ansible.builtin.include_vars: "{{ dotfiles_distro }}.yml"

- name: Install C/C++ development packages
  ansible.builtin.package:
    name: "{{ cpp_dev_packages }}"
    state: present
  become: true

- name: Ensure Python is available via mise
  ansible.builtin.command: "{{ dotfiles_home }}/.local/bin/mise use --global python@latest"
  environment:
    MISE_YES: "1"
  register: mise_python
  changed_when: "'installed' in mise_python.stderr"

- name: Install Conan 2 via mise python
  ansible.builtin.shell: "{{ dotfiles_home }}/.local/bin/mise exec python -- pip install --user conan"
  environment:
    MISE_YES: "1"
  args:
    creates: "{{ dotfiles_home }}/.local/bin/conan"
